<!-- STATE 1: The Template Chooser -->
<div id="templateChooser" style="width: 100%; padding: 0px 40px 40px 40px; box-sizing: border-box; display: block;">
    <h1 style="color: white; text-align: center; margin-bottom: 30px;">Choose a Card Template</h1>
    <div id="templateGrid" class="template-grid">
        <!-- JavaScript will inject the grid boxes here based on the Registry -->
    </div>
</div>

<!-- STATE 2: The Editor (Hidden by default via display:none) -->
<div id="cardEditor" style="display: none; width: 100%; height: 100%; padding-top: 60px; box-sizing: border-box;">
    <div id="createLeftMenu">
        <!-- Back Button to return to the grid -->
        <button id="backToGridBtn" style="padding: 10px; background: #555; color: white; border: none; cursor: pointer;">← Back to Templates</button>

        <div id="dynamicMenuArea" style="flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column;"></div>

        <!-- Export Section -->
        <div style="padding: 10px; width: 100%; box-sizing: border-box;">
            <button id="exportBtn" style="width: 100%; padding: 15px; background: limegreen; color: white; font-weight: bold; cursor: pointer; border: none; border-radius: 5px;">
                Generate Share Link
            </button>
            <div id="exportResult" style="padding-top: 10px; word-break: break-all; display: none; text-align: center;"></div>
        </div>
    </div>
    <div id="createCard"></div>
</div>
