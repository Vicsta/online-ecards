<!-- STATE 1: The Template Chooser -->
<div id="templateChooser">
    <h1>Choose a Card Template</h1>
    <div id="templateGrid" class="template-grid">
        <!-- JavaScript will inject the grid boxes here based on the Registry -->
    </div>
</div>

<!-- STATE 2: The Editor (Hidden by default via CSS) -->
<div id="cardEditor">
    <div id="createLeftMenu">
        <!-- Back Button to return to the grid -->
        <button id="backToGridBtn">← Back to Templates</button>

        <div id="dynamicMenuArea"></div>

        <!-- Export Section -->
        <div id="exportSection">
            <button id="exportBtn">Generate Share Link</button>
            <div id="exportResult"></div>
        </div>
    </div>

    <!-- 3D Canvas -->
    <div id="createCard"></div>
</div>
