<div id="createLeftMenu">
    <div id="menuPageBar">
        <div class="menuPageTab">Settings</div>
        <div class="menuPageTab">Front</div>
        <div class="menuPageTab">Inside L</div>
        <div class="menuPageTab">Inside R</div>
        <div class="menuPageTab">Back</div>
    </div>

    <!-- Settings Menu -->
    <div id="settingMenu" class="leftMenu">
        <label for="fontSizeInput">Font Size</label>
        <input id="fontSizeInput" type="number" min="8" max="72" value="16">

        <label for="fontStyleInput">Font Style</label>
        <select id="fontStyleInput">
            <option value="Arial">Arial</option>
            <option value="Times New Roman">Times New Roman</option>
            <option value="Courier New">Courier New</option>
            <option value="fangsong" selected>FangSong</option>
        </select>

        <label for="paddingInput">Card Padding</label>
        <input id="paddingInput" type="number" min="0" max="50" value="0">
    </div>

    <!-- Front Page Menu -->
    <div id="menu1" class="leftMenu hidden">
        <label for="bgFront"><b>Full Page Background</b></label>
        <input id="bgFront" type="text" placeholder="URL or Hex Color (e.g., #ffcc00)">
        <hr style="width: 100%; margin: 10px 0;">

        <label for="text1Top">Top Text</label>
        <input id="text1Top" type="text" placeholder="Enter top text">
        <label for="bg1Top">Top Background</label>
        <input id="bg1Top" type="text" placeholder="URL or Hex Color">

        <label for="text1Middle">Middle Text</label>
        <input id="text1Middle" type="text" placeholder="Enter middle text">
        <label for="bg1Middle">Middle Background</label>
        <input id="bg1Middle" type="text" placeholder="URL or Hex Color">

        <label for="text1Bottom">Bottom Text</label>
        <input id="text1Bottom" type="text" placeholder="Enter bottom text">
        <label for="bg1Bottom">Bottom Background</label>
        <input id="bg1Bottom" type="text" placeholder="URL or Hex Color">
    </div>

    <!-- Inside Left Menu -->
    <div id="menu2" class="leftMenu hidden">
        <label for="bgPage1"><b>Full Page Background</b></label>
        <input id="bgPage1" type="text" placeholder="URL or Hex Color">

        <label for="text2Top">Top Text</label>
        <input id="text2Top" type="text" placeholder="Enter top text">
        <label for="bg2Top">Top Background</label>
        <input id="bg2Top" type="text" placeholder="URL or Hex Color">

        <input id="bg2Middle" type="text" placeholder="URL or Hex Color">

        <input id="bg2Bottom" type="text" placeholder="URL or Hex Color">

    <!-- Inside Right Menu -->
    <div id="menu3" class="leftMenu hidden">
        <label for="bgPage2"><b>Full Page Background</b></label>
        <input id="bgPage2" type="text" placeholder="URL or Hex Color">

    <!-- Export Section -->
    <div style="margin-top: auto; padding: 10px; width: 100%;">
        <button id="exportBtn" style="width: 100%; padding: 15px; background: limegreen; color: white; font-weight: bold; cursor: pointer; border: none; border-radius: 5px;">
            Generate Share Link
        </button>
        <div id="exportResult" style="padding-top: 10px; word-break: break-all; display: none; text-align: center;"></div>
