<!-- The beautiful empty state (Shows when no ?c= data is in the URL) -->
<div id="noCardData" class="empty-state-container">
    <div class="empty-state-icon">📭</div>
    <h2>No Card Found</h2>
    <p>We couldn't find any card data in this link. If your friend sent you a link, paste it below, or start making your own!</p>

    <div class="paste-link-box">
        <input type="text" id="pasteCardUrl" placeholder="Paste the https:// link here...">
        <button onclick="loadPastedLink()" class="button">Load Card</button>
    </div>

    <div class="divider"><span>OR</span></div>

    <!-- Uses the same hero-btn class from your Home page! -->
    <button id="emptyStateCreateBtn" class="button">Start Creating Now</button>
</div>

<!-- The container for the actual 3D card (Shows when data IS found) -->
<div id="cardViewContainer" style="display: none;">
    <!-- Your JS will inject the built card here -->
</div>
