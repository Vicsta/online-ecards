<div class="landing-container" style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; text-align: center; padding: 40px 20px;">

  <!-- Dynamic Title & Text -->
  <h1 id="landingTitle" style="font-size: 3rem; color: var(--text-main); margin-bottom: 20px; font-weight: bold;">
    Loading Theme...
  </h1>
  <p id="landingText" style="font-size: 1.2rem; color: var(--text-muted); max-width: 600px; margin-bottom: 40px;">
    Please wait while we load this custom e-card experience.
  </p>

  <!-- Dynamic Hero Image -->
  <div style="max-width: 800px; width: 100%; border-radius: 16px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid var(--border-color); margin-bottom: 40px; background: var(--bg-input);">
    <img id="landingImage" src="" alt="Theme Preview" style="width: 100%; height: auto; display: block; object-fit: cover;">
  </div>

  <!-- Dynamic CTA Button -->
  <a href="#" id="landingCtaBtn" class="hero-btn seo-link" style="font-size: 1.5rem; padding: 15px 50px; text-decoration: none;">
    Start Building Now
  </a>
</div>
