<div id="menuPageBar">
    <div class="menuPageTab menuPageTabSelected" id="v2TabSettings">Settings</div>
    <div id="dynamicPageTabsContainer" style="display: contents;"></div>
</div>

<div id="settingMenu" class="leftMenu">

    <label><b>Card Theme</b></label>
    <button id="openPresetModalBtn"
            style="width: 100%; padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-bottom: 15px; transition: background 0.2s;">
        🌟 Browse Theme Presets
    </button>
    <hr style="width: 100%; margin: 10px 0;">

    <label for="sheetsInput"><b>Physical Sheets of Paper (1-10)</b></label>
    <p style="font-size: 0.8em; color: #bbb; margin-top: 0;">1 = Postcard. 2 = Folded Card. 3+ = Book.</p>
    <input id="sheetsInput" type="number" min="1" max="10" value="2">
    <hr style="width: 100%; margin: 15px 0;">

    <label for="fontSizeInput">Global Font Size</label>
    <input id="fontSizeInput" type="number" min="8" max="72" value="16">
    <label for="fontStyleInput">Global Font Style</label>
    <select id="fontStyleInput">
        <option value="Arial" selected>Arial</option>
        <option value="Times New Roman">Times New Roman</option>
        <option value="fangsong">FangSong</option>
    </select>
    <label for="paddingInput">Global Padding</label>
    <input id="paddingInput" type="number" value="10">
</div>

<div id="dynamicMenusContainer"></div>
