<div id="menuPageBar">
    <div class="menuPageTab">Settings</div>
    <div class="menuPageTab">Front</div>
    <div class="menuPageTab">Inside L</div>
    <div class="menuPageTab">Inside R</div>
    <div class="menuPageTab">Back</div>
</div>

<div id="settingMenu" class="leftMenu">
    <label for="fontSizeInput">Font Size</label>
    <input id="fontSizeInput" type="number" min="8" max="72" value="16">
    <label for="fontStyleInput">Font Style</label>
    <select id="fontStyleInput">
        <option value="Arial">Arial</option>
        <option value="Times New Roman">Times New Roman</option>
        <option value="Courier New">Courier New</option>
        <option value="fangsong" selected>FangSong</option>
    </select>
    <label for="paddingInput">Card Padding</label>
    <input id="paddingInput" type="number" min="0" max="50" value="0">
</div>

<div id="menu1" class="leftMenu hidden">
    <label for="bgFront"><b>Full Page Background</b></label>
    <input id="bgFront" type="text" placeholder="URL or Hex (#ffcc00)">
    <hr style="width: 100%; margin: 10px 0;">
    <label for="text1Top">Top Text</label>
    <input id="text1Top" type="text" placeholder="Enter top text">
    <label for="bg1Top">Top Background</label>
    <input id="bg1Top" type="text" placeholder="URL or Hex Color">
    <label for="text1Middle">Middle Text</label>
    <input id="text1Middle" type="text" placeholder="Enter middle text">
    <label for="bg1Middle">Middle Background</label>
    <input id="bg1Middle" type="text" placeholder="URL or Hex Color">
    <label for="text1Bottom">Bottom Text</label>
    <input id="text1Bottom" type="text" placeholder="Enter bottom text">
    <label for="bg1Bottom">Bottom Background</label>
    <input id="bg1Bottom" type="text" placeholder="URL or Hex Color">
</div>
