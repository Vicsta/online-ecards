<div class="page-container" style="display: flex; justify-content: center; padding-top: 40px;">

    <!-- Single Unified Glass Container -->
    <div class="contact-form-container">

        <!-- Header Area -->
        <div style="text-align: center; margin-bottom: 35px;">
            <h1 style="color: var(--accent-color); font-size: 3rem; margin-top: 0; margin-bottom: 10px;">Contact Us</h1>
            <p style="color: var(--text-muted); font-size: 1.1rem;">Have a question, feature request, or found a bug? Let us know!</p>
        </div>

        <!-- The Form -->
        <form id="contactForm">
            <div class="input-group">
                <label for="contactName">Name</label>
                <input type="text" id="contactName" placeholder="Your Name" required>
            </div>

            <div class="input-group">
                <label for="contactEmail">Email</label>
                <input type="email" id="contactEmail" placeholder="your@email.com" required>
            </div>

            <div class="input-group">
                <label for="contactMessage">Message</label>
                <textarea id="contactMessage" rows="5" placeholder="How can we help?" required></textarea>
            </div>

            <!-- NEW: The Response Checkbox -->
            <div class="checkbox-group">
                <input type="checkbox" id="wantsResponse">
                <label for="wantsResponse">I would like a response to my message!</label>
            </div>

            <button type="submit" class="hero-btn" style="width: 100%; border: none; cursor: pointer; margin-top: 10px;">Send Message</button>
        </form>
    </div>

</div>
