<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="favicon.png">
    <meta charset="UTF-8">
    <title>Online E-Cards</title>
    <link rel="stylesheet" href="static/css/card.css">
    <link rel="stylesheet" href="static/css/css.css">
    <link rel="stylesheet" href="static/css/view.css">
    <link rel="stylesheet" href="static/css/create.css">
    <link rel="stylesheet" href="static/css/cards/v2_card.css">
</head>
<body>

<nav class="navbar">
    <!-- Brand Name locked to the left -->
    <a href="/home" class="nav-brand">Online E-Cards</a>

    <!-- The container that stretches the buttons -->
    <div class="nav-links-container">
        <a href="/home" class="nav-link">Home</a>
        <a href="/about" class="nav-link">About</a>
        <a href="/view" class="nav-link">View</a>
        <a href="/create" class="nav-link">Create</a>
    </div>
</nav>

<div class="fullPage" id="home"></div>
<div class="fullPage" id="view"></div>
<div class="fullPage" id="about"></div>
<div class="fullPage" id="create"></div>

<script src="static/js/lz-string.min.js"></script>
<script src="static/js/jquery-3.7.1.min.js"></script>

<!-- Core Logic -->
<script src="static/js/js.js"></script>
<script src="static/js/card.js"></script>

<!-- Card Templates & Registry -->
<script src="static/js/cards/cardV1.js"></script>
<script src="static/js/cards/cardV2.js"></script>
<script src="static/js/registry.js"></script>

<!-- (You can remove ads.js/cardExamples.js if you aren't using them right now) -->

<script>
    function loadScript(src) {
        const script = document.createElement('script');
        script.src = src;
        script.async = false;
        document.head.appendChild(script);
    }

    function loadPage(page, elementToReplace, pageScript) {
        fetch(page)
            .then(response => {
                if (!response.ok) throw new Error('Network response was not ok');
                return response.text();
            })
            .then(html => {
                document.getElementById(elementToReplace).innerHTML = html;
                if(pageScript) loadScript(pageScript);
            })
            .catch(error => console.error('Error loading page:', error));
    }

    loadPage("templates/home.html", "home", "static/js/home.js");
    loadPage("templates/view.html", "view", "static/js/view.js");
    loadPage("templates/about.html", "about", "static/js/about.js");
    loadPage("templates/create.html", "create", "static/js/create.js");
</script>

</body>
</html>
