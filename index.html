<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="/favicon.png">
    <meta charset="UTF-8">
    <title>Online E-Cards</title>
    <link rel="stylesheet" href="/static/css/theme.css?v=1">

    <link rel="stylesheet" href="/static/css/card.css?v=12">
    <link rel="stylesheet" href="/static/css/css.css?v=12">
    <link rel="stylesheet" href="/static/css/view.css?v=12">
    <link rel="stylesheet" href="/static/css/create.css?v=12">
    <link rel="stylesheet" href="/static/css/cards/v2_card.css?v=12">
    <link rel="stylesheet" href="/static/css/background.css?v=1">
</head>
<body>

<nav class="navbar">
    <!-- Brand Name locked to the left -->
    <div class="nav-left-controls">
        <a href="/home" class="nav-brand">Online E-Cards</a>
        <select id="globalThemeSelector" class="theme-dropdown" title="Change Website Theme">
            <option value="dark">🌙 Dark</option>
            <option value="birthday">🎉 Birthday</option>
            <option value="valentine">💖 Valentine</option>
        </select>
    </div>

    <!-- The container that stretches the buttons (Centered) -->
    <div class="nav-links-container">
        <a href="/home" class="nav-link">Home</a>
        <a href="/about" class="nav-link">About</a>
        <a href="/view" class="nav-link">View</a>
        <a href="/create" class="nav-link">Create</a>
        <a href="/contact" class="nav-link">Contact</a> <!-- Added Contact! -->
    </div>

    <!-- NEW: Safe Controls locked to the right -->
    <!-- NEW: Safe Controls locked to the right -->
    <div class="nav-toggle-controls">

        <!-- The fully clickable Donate Button -->
        <a href="https://ko-fi.com/vicstadev" target="_blank" class="nav-donate-btn" title="Buy me a coffee!">
            <span class="donate-icon">☕</span>
            <span class="donate-text">Donate</span>
        </a>

        <!-- The Banner Toggle (Safe from blockers!) -->
        <span class="toggle-label">Ads</span>
        <label class="switch">
            <input type="checkbox" id="supportToggleSwitch" checked>
            <span class="slider round"></span>
        </label>

        <!-- The Tooltip -->
        <div class="tooltip-container">
            <div class="tooltip-icon">?</div>
            <div class="tooltip-text">
                This site is supported by standard banner ads and an optional short video when generating a link. You can disable them completely here!
            </div>
        </div>
    </div>
</nav>

<div id="supportBannerLeft" class="support-banner">
    <span class="banner-placeholder">Banner Space</span>
</div>

<div id="supportBannerRight" class="support-banner right">
    <span class="banner-placeholder">Banner Space</span>
</div>

<div id="supportBannerMobile" class="support-banner-mobile">
    <span class="banner-placeholder">Mobile Banner Space</span>
</div>

<div class="fullPage" id="home"></div>
<div class="fullPage" id="view"></div>
<div class="fullPage" id="about"></div>
<div class="fullPage" id="create"></div>
<div class="fullPage" id="contact"></div>

<div id="presetModalOverlay" class="modal-overlay">
    <div class="modal-content">
        <div class="modal-header">
            <h3>Select a Card Theme</h3>
            <button id="closePresetModal" class="close-btn">&times;</button>
        </div>
        <div id="presetGrid" class="preset-grid"></div>
    </div>
</div>

<script src="/static/js/lz-string.min.js"></script>
<script src="/static/js/jquery-3.7.1.min.js"></script>
<script src="/static/js/js.js"></script>
<script src="/static/js/card.js"></script>
<script src="/static/js/cards/cardV1.js"></script>
<script src="/static/js/cards/cardV2.js"></script>
<script src="/static/js/registry.js?v=12"></script>
<script src="/static/js/background.js?v=1"></script>

<script>
    function loadScript(src) {
        const script = document.createElement('script');
        script.src = src;
        script.async = false;
        document.head.appendChild(script);
    }

    function loadPage(page, elementToReplace, pageScript) {
        fetch(page)
            .then(response => {
                if (!response.ok) throw new Error('Network response was not ok');
                return response.text();
            })
            .then(html => {
                document.getElementById(elementToReplace).innerHTML = html;
                if(pageScript) loadScript(pageScript);
            })
            .catch(error => console.error('Error loading page:', error));
    }

    loadPage("templates/home.html", "home", "/static/js/home.js");
    loadPage("templates/view.html", "view", "/static/js/view.js?v=12");
    loadPage("templates/about.html", "about", "/static/js/about.js");
    loadPage("templates/contact.html", "contact", "/static/js/contact.js");
    loadPage("templates/create.html", "create", "/static/js/create.js?v=12");

    // =========================================
    // GLOBAL THEME MANAGER
    // =========================================
    const themeSelector = document.getElementById("globalThemeSelector");
    const savedTheme = localStorage.getItem("siteTheme") || "dark";

    function applySiteTheme(themeValue) {
        // 1. Update the CSS Variables (UI Colors)
        if (themeValue === "dark") {
            document.body.removeAttribute("data-theme"); // Defaults back to :root
        } else {
            document.body.setAttribute("data-theme", themeValue);
        }

        // 2. Update the Animated Background Layer
        if (typeof AnimatedBackground !== "undefined") {
            if (themeValue === "dark") {
                AnimatedBackground.setTheme("dark");
                AnimatedBackground.setShape("square");
            } else if (themeValue === "birthday") {
                AnimatedBackground.setTheme("light");
                AnimatedBackground.setShape("square");
            } else if (themeValue === "valentine") {
                AnimatedBackground.setTheme("light");
                AnimatedBackground.setShape("circle"); // Valentines gets floating circles!
            }
        }
    }

    // Set the dropdown to whatever the user picked last time
    themeSelector.value = savedTheme;

    // Instantly apply the CSS so there is no "flash" of the wrong colors
    if (savedTheme !== "dark") document.body.setAttribute("data-theme", savedTheme);

    // Wait for background.js to build the canvas, THEN apply the animation theme
    window.addEventListener("load", () => {
        applySiteTheme(themeSelector.value);
    });

    // Listen for the user clicking the dropdown
    themeSelector.addEventListener("change", (e) => {
        const newTheme = e.target.value;
        localStorage.setItem("siteTheme", newTheme); // Save it!
        applySiteTheme(newTheme);
    });
</script>

</body>
</html>
